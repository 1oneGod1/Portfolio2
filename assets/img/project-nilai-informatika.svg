<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#020617"/>
  <text x="30" y="38" fill="#38bdf8" font-family="monospace" font-size="20" font-weight="bold">CS.Report</text>
  <rect x="620" y="15" width="150" height="30" rx="6" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="695" y="35" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="middle">LOGIN GURU →</text>
  
  <!-- Main Card -->
  <rect x="150" y="120" width="500" height="400" rx="20" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  
  <!-- Search Icon -->
  <circle cx="400" cy="180" r="30" fill="none" stroke="#38bdf8" stroke-width="3"/>
  <line x1="420" y1="200" x2="435" y2="215" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Title -->
  <text x="400" y="260" fill="#f8fafc" font-family="system-ui" font-size="28" font-weight="bold" text-anchor="middle">Terminal Pencarian</text>
  
  <!-- Search Input -->
  <rect x="200" y="300" width="300" height="50" rx="8" fill="#020617" stroke="#475569" stroke-width="1"/>
  <text x="220" y="332" fill="#64748b" font-family="monospace" font-size="14">>_ Query: [NIS] or [Name]...</text>
  
  <!-- Execute Button -->
  <rect x="520" y="300" width="100" height="50" rx="8" fill="#0891b2"/>
  <text x="570" y="332" fill="#f0f9ff" font-family="system-ui" font-size="14" font-weight="bold" text-anchor="middle">EXECUTE</text>
  
  <!-- Protocol Section -->
  <text x="400" y="400" fill="#64748b" font-family="monospace" font-size="12" text-anchor="middle">>> PROTOKOL</text>
  <text x="400" y="425" fill="#475569" font-family="system-ui" font-size="10" text-anchor="middle">AKSES</text>
  
  <!-- Checklist -->
  <text x="280" y="460" fill="#38bdf8" font-size="16">✓</text>
  <text x="300" y="460" fill="#94a3b8" font-family="system-ui" font-size="14">Input NIS / Nama siswa</text>
  
  <text x="280" y="490" fill="#38bdf8" font-size="16">✓</text>
  <text x="300" y="490" fill="#94a3b8" font-family="system-ui" font-size="14">Pilih dari hasil list pencarian</text>
  
  <text x="280" y="520" fill="#64748b" font-size="14">🔒</text>
  <text x="300" y="520" fill="#64748b" font-family="system-ui" font-size="14">Masukkan Password Siswa</text>
</svg>